<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f2;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: #1a1a1a;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
  }
  #drop-zone {
    border: 1.5px dashed #bbb;
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: #fff;
    margin-bottom: 1rem;
  }
  #drop-zone.over {
    background: #f0f0ec;
    border-color: #888;
  }
  #drop-zone .label {
    font-size: 14px;
    color: #666;
    margin-bottom: 0.5rem;
  }
  #drop-zone .sub {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 1rem;
  }
  .file-btn {
    font-size: 13px;
    padding: 6px 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #f5f5f2;
    color: #1a1a1a;
    cursor: pointer;
    transition: background 0.1s;
  }
  .file-btn:hover { background: #e8e8e4; }
  #file-info {
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: #666;
    margin-bottom: 0.75rem;
  }
  #filename {
    font-weight: 500;
    color: #1a1a1a;
    font-size: 13px;
  }
  button#copy-btn {
    font-size: 12px;
    padding: 4px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    transition: background 0.1s;
  }
  button#copy-btn:hover { background: #f0f0ec; }
  #copy-ok {
    display: none;
    font-size: 12px;
    color: #3a7c4a;
  }
  #output-wrap { display: none; }
  pre#output {
    font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.65;
    background: #fff;
    border: 1px solid #e0e0dc;
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
    white-space: pre;
    color: #1a1a1a;
  }
</style>
</head>
<body>
<div class="container">
  <h1>CSV Viewer</h1>

  <div id="drop-zone">
    <div class="label">CSVファイルをここにドロップ</div>
    <div class="sub">または</div>
    <label>
      <span class="file-btn">ファイルを選択</span>
      <input type="file" accept=".csv" id="file-input" style="display:none;">
    </label>
  </div>

  <div id="file-info">
    <span id="filename"></span>
    <button id="copy-btn">コピー</button>
    <span id="copy-ok">コピーしました</span>
  </div>

  <div id="output-wrap">
    <pre id="output"></pre>
  </div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const output = document.getElementById('output');
  const outputWrap = document.getElementById('output-wrap');
  const fileInfo = document.getElementById('file-info');
  const filenameEl = document.getElementById('filename');
  const copyBtn = document.getElementById('copy-btn');
  const copyOk = document.getElementById('copy-ok');

  function readFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      output.textContent = e.target.result;
      outputWrap.style.display = 'block';
      fileInfo.style.display = 'flex';
      filenameEl.textContent = file.name;
    };
    reader.readAsText(file, 'UTF-8');
  }

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => readFile(e.target.files[0]));

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(output.textContent).then(() => {
      copyOk.style.display = 'inline';
      setTimeout(() => copyOk.style.display = 'none', 2000);
    });
  });
</script>
</body>
</html>
